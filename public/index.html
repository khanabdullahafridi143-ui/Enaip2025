<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdullah Khan</title>

<script src="https://cdn.tailwindcss.com"></script><script>"https://cdn.tailwindcss.com"</script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-gray-200 text-gray-800">

<!-- HERO -->
<section class="h-screen flex items-center justify-center relative overflow-hidden">

  <!-- background -->
  <img src="abdullah.jpeg" 
       class="absolute w-full h-full object-cover blur-md scale-110">

  <!-- overlay -->
  <div class="absolute inset-0 bg-black/60"></div>

  <!-- content -->
  <div class="relative text-center text-white px-4" data-aos="fade-up">
    <h1 class="text-5xl md:text-7xl font-bold tracking-wide">
     TIBA
    </h1>
    <p class="text-lg md:text-xl mt-4 text-white/80 max-w-xl mx-auto">
      AFRIDI ✨
    </p>
  </div>

</section>

<!-- CHI SONO -->
<section class="max-w-6xl mx-auto px-6 py-24 grid md:grid-cols-2 gap-16 items-center">

  <!-- immagine -->
  <div data-aos="fade-right" class="relative group">
    <div class="absolute -inset-2 bg-gradient-to-r from-blue-400 via-purple-300 to-amber-300 
    blur-xl opacity-40 group-hover:opacity-70 transition rounded-3xl"></div>

    <img src="abdullah.jpeg" 
         class="relative rounded-3xl shadow-2xl w-full h-[420px] object-cover">
  </div>

  <!-- testo -->
  <div data-aos="fade-left" class="space-y-6">
    <h2 class="text-4xl font-bold">Chi sono</h2>
    <p class="text-lg text-gray-700 leading-relaxed">
      Mi chiamo Abdullah Khan 
    </p>
  </div>

</section>

<!-- SKILLS -->
<section class="max-w-6xl mx-auto px-6 py-12 grid md:grid-cols-3 gap-8">

  <!-- card -->
  <div class="group p-6 bg-white/70 backdrop-blur-xl rounded-2xl shadow-lg 
  min-h-[180px] flex flex-col justify-center text-center hover:shadow-2xl transition">

    <h3 class="text-xl font-bold mb-2">Web Design</h3>
    <p class="text-gray-600 text-sm">Siti moderni e responsive</p>
  </div>

  <div class="group p-6 bg-white/70 backdrop-blur-xl rounded-2xl shadow-lg 
  min-h-[180px] flex flex-col justify-center text-center hover:shadow-2xl transition">

    <h3 class="text-xl font-bold mb-2">Frontend</h3>
    <p class="text-gray-600 text-sm">HTML, CSS, Tailwind</p>
  </div>

  <div class="group p-6 bg-white/70 backdrop-blur-xl rounded-2xl shadow-lg 
  min-h-[180px] flex flex-col justify-center text-center hover:shadow-2xl transition">

    <h3 class="text-xl font-bold mb-2">Creatività</h3>
    <p class="text-gray-600 text-sm">Design elegante e moderno</p>
  </div>

</section>

<!-- TIMELINE -->
<section class="max-w-4xl mx-auto px-6 py-24">

  <h2 class="text-4xl font-bold text-center mb-16">
    Gli scout a Muggia
  </h2>

  <div class="relative border-l-2 border-gray-300 space-y-12 pl-6">

    <!-- item -->
    <div data-aos="fade-right">
      <div class="absolute -left-3 w-6 h-6 bg-blue-500 rounded-full"></div>
      <h3 class="text-xl font-bold">1922</h3>
      <p class="text-gray-600 mt-1">
        Nasce il gruppo scout e le prime promesse.
      </p>
    </div>

    <div data-aos="fade-right">
      <div class="absolute -left-3 w-6 h-6 bg-purple-500 rounded-full"></div>
      <h3 class="text-xl font-bold">1974</h3>
      <p class="text-gray-600 mt-1">
        Nasce AGESCI Muggia 1.
      </p>
    </div>

  </div>

</section>

<script>
AOS.init({duration:1000, once:true});
</script>

</body>
</html>
